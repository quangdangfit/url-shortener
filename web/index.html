<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener - Shorten Your Links</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
            body {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            }
            .container {
                max-width: 800px;
            }
            .card {
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            }
            .btn-primary {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border: none;
                padding: 12px 30px;
                font-weight: 600;
            }
            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            }
            .form-control {
                padding: 12px 16px;
                border-radius: 8px;
                border: 2px solid #e0e0e0;
            }
            .form-control:focus {
                border-color: #667eea;
                box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            }
            .form-control::placeholder {
                color: #6c757d;
                opacity: 0.6;
                font-weight: normal;
            }
            .result-box {
                background: #f8f9fa;
                border-radius: 8px;
                padding: 16px;
                margin-top: 20px;
            }
            .copy-btn {
                cursor: pointer;
                color: #667eea;
            }
            .copy-btn:hover {
                color: #764ba2;
            }
            .stats-section {
                display: none;
            }
            .loading {
                opacity: 0.6;
                pointer-events: none;
            }
        </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="text-white fw-bold">URL Shortener</h1>
            <p class="text-white-50">Shorten your long URLs quickly and easily</p>
        </div>

        <div class="card">
            <div class="card-body p-4 p-md-5">
                <form id="shorten-form" hx-post="/shorten" hx-target="#result" hx-swap="innerHTML" hx-indicator="#loading">
                    <div class="mb-3">
                        <label for="url" class="form-label fw-semibold">Enter your long URL</label>
                        <input type="url" class="form-control form-control-lg" id="url" name="url" 
                               placeholder="https://example.com/very-long-url-to-shorten" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="ttl_days" class="form-label fw-semibold">Expiration (optional)</label>
                        <select class="form-select" id="ttl_days" name="ttl_days">
                            <option value="">Never expires</option>
                            <option value="1">1 day</option>
                            <option value="7">7 days</option>
                            <option value="30">30 days</option>
                            <option value="90">90 days</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Shorten URL</button>
                    </div>
                </form>

                <div id="loading" class="text-center mt-3" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <div id="result"></div>
            </div>
        </div>

        <div class="text-center mt-4 text-white-50">
            <small>Made with HTMX • Fast & Simple URL Shortening</small>
        </div>
    </div>

    <script>
            // Handle form submission - let HTMX handle form data naturally
            htmx.on('htmx:afterRequest', function(evt) {
                if (evt.detail.successful && evt.detail.elt.id === 'shorten-form') {
                    const resultDiv = document.getElementById('result');
                    resultDiv.scrollIntoView({ behavior: 'smooth' });
                }
            });
        </script>
</body>
</html>
