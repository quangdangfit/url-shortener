<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Statistics - URL Shortener</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        .container {
            max-width: 900px;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .url-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px 16px;
            word-break: break-all;
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="text-white fw-bold">URL Statistics</h1>
            <p class="text-white-50">Analytics for your shortened URL</p>
        </div>

        <div class="card mb-4">
            <div class="card-body p-4">
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <div class="stat-card">
                            <div class="stat-number">{{.TotalClicks}}</div>
                            <div>Total Clicks</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <h6 class="text-muted">Short URL</h6>
                        <div class="url-box mb-2">
                            <a href="{{.ShortURL}}" target="_blank">{{.ShortURL}}</a>
                        </div>
                        <h6 class="text-muted mt-3">Original URL</h6>
                        <div class="url-box">
                            <a href="{{.OriginalURL}}" target="_blank">{{.OriginalURL}}</a>
                        </div>
                        <div class="mt-3 text-muted small">
                            Created: {{.CreatedAt}}
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-4">
                <h5 class="mb-3">Clicks by Day (Last 30 Days)</h5>
                <div class="chart-container">
                    <canvas id="clicksChart"></canvas>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/" class="btn btn-outline-light">Shorten Another URL</a>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('clicksChart').getContext('2d');
        const data = {
            labels: {{.Dates}},
            datasets: [{
                label: 'Clicks',
                data: {{.Counts}},
                backgroundColor: 'rgba(102, 126, 234, 0.2)',
                borderColor: 'rgba(102, 126, 234, 1)',
                borderWidth: 2,
                tension: 0.3,
                fill: true
            }]
        };
        
        new Chart(ctx, {
            type: 'line',
            data: data,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            precision: 0
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
    </script>
</body>
</html>
